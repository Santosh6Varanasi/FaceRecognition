version: '3.8'

services:
  # Flask ML API
  flask-api:
    build:
      context: ./flask_api
      dockerfile: Dockerfile
    container_name: face-recognition-flask
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:admin@host.docker.internal:5432/face_recognition
      - RECOGNITION_MODEL=ArcFace
      - DETECTOR_BACKEND=mtcnn
      - SVM_CONFIDENCE_THRESHOLD=0.50
      - FLASK_PORT=5000
      - UNKNOWN_FACE_IMAGES_DIR=/app/unknown_face_images
      - VIDEO_UPLOADS_DIR=/app/video_uploads
      - TRAINING_IMAGES_DIR=/app/training_images
      - VIDEO_FRAME_INTERVAL_MS=500
      - VIDEO_MAX_FILE_SIZE_MB=500
      - CORS_ORIGINS=*
    volumes:
      # Mount local directory for unknown face images
      - ./unknown_face_images:/app/unknown_face_images
      # Mount local directory for uploaded video files
      - ./flask_api/video_uploads:/app/video_uploads
      # Mount local directory for training images
      - ./training_images:/app/training_images
      # Mount sample data directory for demo videos
      - ./sample_data:/app/sample_data
    networks:
      - face-recognition-network
    restart: unless-stopped

  # Next.js Backend
  nextjs-backend:
    build:
      context: ./nextjs_backend
      dockerfile: Dockerfile
    container_name: face-recognition-nextjs
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:admin@host.docker.internal:5432/face_recognition
      - FLASK_API_URL=http://flask-api:5000
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:3000
    depends_on:
      - flask-api
    networks:
      - face-recognition-network
    restart: unless-stopped

  # Angular Frontend
  angular-frontend:
    build:
      context: ./angular_frontend
      dockerfile: Dockerfile
    container_name: face-recognition-angular
    ports:
      - "4200:80"
    depends_on:
      - nextjs-backend
    networks:
      - face-recognition-network
    restart: unless-stopped

networks:
  face-recognition-network:
    driver: bridge
